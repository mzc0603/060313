                steps: ["大虾剪虾须，去虾线", "锅中加水，放姜片、葱段、料酒", "水开下虾煮3分钟", "捞出装盘", "调制蘸料：生抽、香醋、蒜末、香油混合", "蘸料食用即可"]
            }
        ];

        let currentCategory = 'all';

        function renderRecipes(recipeList) {
            const grid = document.getElementById('recipeGrid');
            const noResults = document.getElementById('noResults');
            
            if (recipeList.length === 0) {
                grid.innerHTML = '';
                noResults.style.display = 'block';
                return;
            }
            
            noResults.style.display = 'none';
            grid.innerHTML = recipeList.map(recipe => `
                <div class="recipe-card" onclick="openModal(${recipe.id})">
                    <div class="card-content">
                        <h3>${recipe.name}</h3>
                        <p class="card-desc">${recipe.desc}</p>
                        <div class="tags">
                            <span class="tag">${recipe.category}</span>
                            <span class="tag">${recipe.tag}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function filterCategory(category) {
            currentCategory = category;
            document.querySelectorAll('nav button').forEach(btn => {
                btn.classList.toggle('active', btn.textContent === (category === 'all' ? '全部' : category));
            });
            
            const filtered = category === 'all' ? recipes : recipes.filter(r => r.category === category);
            renderRecipes(filtered);
        }

        function searchRecipes() {
            const query = document.getElementById('searchInput').value.trim().toLowerCase();
            const searchResults = recipes.filter(r => 
                r.name.toLowerCase().includes(query) || 
                r.ingredients.some(i => i.toLowerCase().includes(query))
            );
            
            if (query) {
                currentCategory = 'all';
                document.querySelectorAll('nav button').forEach(btn => {
                    btn.classList.toggle('active', btn.textContent === '全部');
                });
            }
            
            renderRecipes(searchResults);
        }

        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') searchRecipes();
        });

        function openModal(id) {
            const recipe = recipes.find(r => r.id === id);
            if (!recipe) return;
            
            document.getElementById('modalTitle').textContent = recipe.name;
            document.getElementById('modalDesc').textContent = recipe.desc;
            
            document.getElementById('modalIngredients').innerHTML = recipe.ingredients.map(i => `<li>${i}</li>`).join('');
            document.getElementById('modalSteps').innerHTML = recipe.steps.map((s, i) => `<li data-step="${i + 1}">${s}</li>`).join('');
            
            document.getElementById('recipeModal').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('recipeModal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        document.getElementById('recipeModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeModal();
        });

        renderRecipes(recipes);
    </script>
</body>
